[pytest]
# rootdir is this directory (src/tests), so ".." puts src/ on sys.path. This lets
# the test modules import the `tests` namespace package (e.g. `from tests.conftest
# import ...`) and the syngen source tree, without requiring an editable install.
pythonpath = ..
rp_uuid = API_TOKEN
rp_endpoint = https://reportportal.epam.com
rp_project = PROJECT_NAME
rp_launch = SYNGEN
rp_launch_attributes = 'PyTest'
rp_launch_description = 'unit tests for the library - "syngen"'
rp_log_level = DEBUG
rp_log_format = [%(levelname)s] %(message)s
rp_is_skipped_an_issue = False
