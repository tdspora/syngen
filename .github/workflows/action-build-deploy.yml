name: CI/CD
on: [push]

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      # Compare requirement files
      - name: Compare requirement files
        run: |
          # Extract requirements from setup.cfg, remove leading spaces, and store in req_compare.txt
          sed -n '/install_requires/,/^\[/{//!p}' setup.cfg | awk '/^ *$/ { next; } { print; }' | sed 's/^    //' > req_compare.txt
          # Compare req_compare.txt with requirements.txt
          # If files are different, echo the differences and exit with error status
          if DIFF=$(diff req_compare.txt requirements.txt) ; then
              echo "Files are the same"
          else
              echo "Files are different:"
              diff req_compare.txt requirements.txt
              exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: |
          pip install -e . && pytest src/tests

  build-wheel:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python_version: "3.11"
            artifact_name: linux-wheel-py3.11
          - os: windows-latest
            python_version: "3.11"
            artifact_name: windows-wheel-py3.11
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel
        run: python -m build --wheel .

      - name: Validate wheel metadata
        run: >-
          python -c "from pathlib import Path; import subprocess, sys; wheels = [str(path) for path in Path('dist').glob('*.whl') if path.is_file()]; assert wheels, 'No built wheel found in dist'; subprocess.check_call([sys.executable, '-m', 'twine', 'check', *wheels])"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  publish-wheel:
    needs: build-wheel
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-22.04
    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation tooling
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Download Linux wheel
        uses: actions/download-artifact@v4
        with:
          name: linux-wheel-py3.11
          path: release-artifacts/linux

      - name: Download Windows wheel
        uses: actions/download-artifact@v4
        with:
          name: windows-wheel-py3.11
          path: release-artifacts/windows

      - name: Prepare unique wheels for publish
        run: |
          set -euo pipefail
          mkdir -p release-dist
          for source_dir in release-artifacts/linux release-artifacts/windows; do
            for artifact in "$source_dir"/*.whl; do
              if [ ! -e "$artifact" ]; then
                continue
              fi

              filename="$(basename "$artifact")"
              target="release-dist/$filename"

              if [ -e "$target" ]; then
                source_hash="$(sha256sum "$artifact" | cut -d' ' -f1)"
                target_hash="$(sha256sum "$target" | cut -d' ' -f1)"

                if [ "$source_hash" = "$target_hash" ]; then
                  echo "Skipping duplicate wheel $filename"
                  continue
                fi

                echo "Conflicting wheel contents for duplicate filename $filename" >&2
                exit 1
              fi

              cp "$artifact" "$target"
            done
          done

          ls -1 release-dist

      - name: Validate publish set
        run: >-
          python -c "from pathlib import Path; import subprocess, sys; wheels = [str(path) for path in Path('release-dist').glob('*.whl') if path.is_file()]; assert wheels, 'No wheel found in release-dist'; subprocess.check_call([sys.executable, '-m', 'twine', 'check', *wheels])"

      - name: Publish wheels
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-dist
          password: ${{ secrets.PYPI_TOKEN }} # For testing purposes: use secrets.PYPI_TEST_TOKEN
          print-hash: true
          verbose: true

  docker:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: tdspora
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta (BASE)
        id: docker_meta_base
        uses: docker/metadata-action@v6
        with:
          images: tdspora/syngen
          tags: |
            type=ref,event=branch
            type=semver,pattern={{raw}}

      - name: Build and push (BASE)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.docker_meta_base.outputs.tags }}
          labels: ${{ steps.docker_meta_base.outputs.labels }}
          cache-from: type=registry,ref=tdspora/syngen:buildcache
          cache-to: type=registry,ref=tdspora/syngen:buildcache,mode=max
