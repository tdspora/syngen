name: Databricks-compatibility
on: [push]

jobs:
  Databricks-compatibility-library:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install dependencies
        run: |
          # Use the consolidated databricks pyproject.toml (name: syngen-databricks,
          # DBR 15.4 LTS pins) as the project config at the repo root.
          cp databricks/pyproject.toml pyproject.toml
          python -m pip install --upgrade pip
          pip install flake8
          pip install ".[test]"

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: |
            export PYTHONPATH=$PYTHONPATH:${{ github.workspace }}/src
            pytest src/tests

      - name: Build test Docker image
        run: |
            cp -n databricks/databricks.dockerfile .
            docker build -t databricks-test-image -f databricks.dockerfile .

      - name: Build Package
        run: |
          pip install build
          python -m build .
      - name: Publish package
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }} # For test release: use secrets.PYPI_TEST_TOKEN and add 'repository_url: https://test.pypi.org/legacy/'
          verbose: true
