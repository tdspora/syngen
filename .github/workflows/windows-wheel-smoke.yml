name: Windows Wheel Smoke Test

on:
  workflow_dispatch:

jobs:
  build-windows-wheel:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build wheel
        run: python -m build --wheel .

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-wheel-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  mock-publish-windows-wheel:
    needs: build-windows-wheel
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validation tooling
        run: |
          python -m pip install --upgrade pip
          pip install twine

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-wheel-py${{ matrix.python-version }}
          path: wheelhouse

      - name: Validate wheel metadata
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path wheelhouse -Filter *.whl | Select-Object -First 1
          if (-not $wheel) {
            throw "No wheel artifact found for Python ${{ matrix.python-version }}"
          }
          python -m twine check $wheel.FullName

      - name: Mock publish placeholder
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path wheelhouse -Filter *.whl | Select-Object -First 1
          Write-Host "Placeholder only: validated Windows wheel for Python ${{ matrix.python-version }}."
          Write-Host "Would publish artifact: $($wheel.Name)"
