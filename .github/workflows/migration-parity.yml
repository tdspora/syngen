name: TF→PyTorch parity gate

# Anti-distribution-collapse safety net for the TensorFlow → PyTorch migration.
# See docs/migration/tf_to_pytorch_migration_plan.md and
# src/tests/integration/parity/README.md.
#
# Three jobs:
#   guard           - cheap, backend-free. Proves the collapse guard itself works.
#                     Runs on every push/PR.
#   full-parity     - heavy. Real launch_train -> launch_infer per fixture, diffed
#                     against the committed TF baseline. Opt-in (label or manual)
#                     so it never burns CI minutes on unrelated PRs. This is the
#                     decisive acceptance gate for the PyTorch branch.
#   capture-baseline- manual only. Freezes the current backend's golden statistics
#                     and uploads them as an artifact to review and commit (Phase 0).

on:
  pull_request:
  push:
    branches: [main, development]
  workflow_dispatch:
    inputs:
      mode:
        description: "What to run beyond the always-on guard self-tests"
        type: choice
        default: guard-only
        options:
          - guard-only
          - full-parity
          - capture-baseline
      fixtures:
        description: "Space-separated fixture subset (blank = all). e.g. 'numeric_wide categorical'"
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: parity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Always-on, ~seconds. No syngen/TF/PyTorch backend needed: it only exercises
  # stats.profile_table / compare_profiles, proving the harness trips on a
  # clamped numeric range (18-90 -> 18-40) and on dropped categories. If this
  # ever goes red, the guard logic itself is broken.
  # ---------------------------------------------------------------------------
  guard:
    name: Collapse-guard self-tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install minimal harness deps (no backend)
        run: |
          python -m pip install --upgrade pip
          # Pinned to match setup.cfg so the profiler behaves identically to CI.
          pip install "numpy==1.26.*" "pandas==2.2.*" "PyYAML==6.*" pytest

      - name: Run anti-collapse self-tests
        working-directory: src/tests/integration/parity
        run: |
          # --noconftest: skip the parent src/tests/conftest.py, which imports the
          # full syngen/TF stack we deliberately did not install here.
          python -m pytest test_parity.py -m parity -k "collapse" \
            --noconftest -p no:cacheprovider -rs

  # ---------------------------------------------------------------------------
  # Heavy. Trains and generates each fixture through the real public API and
  # asserts no distribution drift vs the committed TF baseline. Opt-in:
  #   * manual run with mode=full-parity, or
  #   * a PR labelled "run-parity".
  # With no committed baselines yet the parity assertions skip cleanly (exit 0);
  # the determinism checks still run real train/infer and so always exercise the
  # backend end-to-end.
  # ---------------------------------------------------------------------------
  full-parity:
    name: Full statistical parity vs TF baseline
    needs: guard
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'full-parity') ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-parity'))
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install syngen (current backend) + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Note baseline availability
        run: |
          if ls src/tests/integration/parity/baselines/*.json >/dev/null 2>&1; then
            echo "Committed baselines found:"
            ls -1 src/tests/integration/parity/baselines/*.json
          else
            echo "::warning::No committed TF baselines under src/tests/integration/parity/baselines/. \
            Parity assertions will skip; run this workflow with mode=capture-baseline on the TF code first, then commit the JSON."
          fi

      - name: Run parity + determinism suite
        run: |
          # Documented invocation from src/tests/integration/parity/README.md.
          pytest src/tests/integration/parity -m parity -rs

  # ---------------------------------------------------------------------------
  # Manual only. Run this on the TF code to freeze the golden per-column stats.
  # Download the artifact, eyeball it, and commit it to baselines/ to arm the
  # full-parity gate for the PyTorch branch.
  # ---------------------------------------------------------------------------
  capture-baseline:
    name: Capture golden baseline (manual)
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'capture-baseline'
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install syngen (current backend)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Capture baseline statistics
        working-directory: src/tests/integration/parity
        env:
          FIXTURES: ${{ inputs.fixtures }}
        run: |
          # Unquoted on purpose: blank => all fixtures; otherwise a space list.
          python capture_baseline.py $FIXTURES
          echo "Captured:"
          ls -1 baselines/*.json

      - name: Upload baselines for review and commit
        uses: actions/upload-artifact@v4
        with:
          name: tf-parity-baselines
          path: src/tests/integration/parity/baselines/*.json
          if-no-files-found: error
          retention-days: 14
